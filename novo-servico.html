<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Serviço - UniService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <div class="logo-icon">U</div>
                <span>UniService</span>
            </a>
            <div class="nav-links">
                <a href="/marketplace">Marketplace</a>
                <a href="/meus-servicos">Meus Serviços</a>
                <a href="/perfil">Perfil</a>
                <a href="#" onclick="logout()" class="btn btn-primary">Sair</a>
            </div>
        </div>
    </nav>

    <section style="padding: 40px 0;">
        <div class="container">
            <div class="form-container">
                <div class="form-header">
                    <h1>Criar Novo Serviço</h1>
                    <p>Ofereça seus serviços na plataforma</p>
                </div>

                <div id="erro" class="alert alert-danger" style="display: none;"></div>
                <div id="sucesso" class="alert alert-success" style="display: none;"></div>

                <form id="novoServicoForm">
                    <div class="form-group">
                        <label>Título</label>
                        <input type="text" name="titulo" placeholder="Título do serviço" required>
                    </div>

                    <div class="form-group">
                        <label>Descrição</label>
                        <textarea name="descricao" placeholder="Descreva seu serviço" rows="4" required></textarea>
                    </div>

                    <div class="form-group">
                        <label>Categoria</label>
                        <input type="text" name="categoria" placeholder="Ex: Tutoria, Design, Programação" required>
                    </div>

                    <div class="form-group">
                        <label>Preço (R$)</label>
                        <input type="number" name="preco" placeholder="0.00" step="0.01" required>
                    </div>

                    <div class="form-group">
                        <label>Tempo de Entrega (dias)</label>
                        <input type="number" name="tempo_entrega" placeholder="Quantos dias?">
                    </div>

                    <button type="submit" class="form-submit">Criar Serviço</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 UniService - Todos os direitos reservados</p>
            </div>
        </div>
    </footer>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('novoServicoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            
            if (!usuario) {
                window.location.href = '/login';
                return;
            }

            const formData = new FormData(e.target);
            const dados = Object.fromEntries(formData);

            try {
                const response = await fetch('/api/servicos', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const data = await response.json();

                if (data.sucesso) {
                    document.getElementById('sucesso').textContent = 'Serviço criado com sucesso!';
                    document.getElementById('sucesso').style.display = 'block';
                    e.target.reset();
                    setTimeout(() => {
                        window.location.href = '/meus-servicos';
                    }, 2000);
                } else {
                    document.getElementById('erro').textContent = data.erro;
                    document.getElementById('erro').style.display = 'block';
                }
            } catch (erro) {
                console.error(erro);
                document.getElementById('erro').textContent = 'Erro ao criar serviço';
                document.getElementById('erro').style.display = 'block';
            }
        });

        function logout() {
            fetch('/api/auth/logout').then(() => {
                localStorage.removeItem('usuario');
                window.location.href = '/';
            });
        }
    </script>
</body>
</html>
