<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMarket - Anunciar Serviço</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">UniMarket</a></h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="marketplace.html">Serviços</a>
            <a href="anunciar.html">Anunciar</a>
            <a href="login.html">Login</a>
            <a href="cadastro.html" class="btn">Cadastre-se</a>
        </nav>
    </header>

    <main class="container">
        <div class="form-container" style="max-width: 600px;">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 20px;">Ofereça seu Serviço</h2>
            <p style="text-align: center; margin-bottom: 20px;">Ajude outros alunos e ganhe uma grana extra!</p>
            
            <form action="#">
                <div class="form-group">
                    <label for="titulo">Título do Serviço</label>
                    <input type="text" id="titulo" placeholder="Ex: Monitoria de Python" required>
                </div>
                
                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="monitoria">Monitoria</option>
                        <option value="formatacao">Formatação/ABNT</option>
                        <option value="design">Design/Slides</option>
                        <option value="programacao">Programação</option>
                        <option value="outros">Outros</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="preco">Preço (R$)</label>
                    <input type="number" id="preco" placeholder="Ex: 30.00" step="0.01" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição Completa</label>
                    <textarea id="descricao" placeholder="Conte mais sobre como você pode ajudar..." required></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Publicar Anúncio</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 UniMarket </p>
    </footer>

</body>
</html>
