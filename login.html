<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMarket - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1><a href="index.html">UniMarket</a></h1>
        <nav>
            <a href="index.html">Início</a>
            <a href="marketplace.html">Serviços</a>
            <a href="anunciar.html">Anunciar</a>
            <a href="login.html">Login</a>
            <a href="cadastro.html" class="btn">Cadastre-se</a>
        </nav>
    </header>

    <main class="container">
        <div class="form-container">
            <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 20px;">Acesse sua conta</h2>
            <form action="#">
                <div class="form-group">
                    <label for="email">E-mail Acadêmico</label>
                    <input type="email" id="email" placeholder="seuemail@aluno.edu.br" required>
                </div>
                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="********" required>
                </div>
                
                <div class="checkbox-group">
                    <input type="checkbox" id="lembrar" name="lembrar">
                    <label for="lembrar">Lembrar de mim por 30 dias</label>
                </div>

                <button type="submit" class="btn btn-alt" style="width: 100%; margin-top: 15px;">Entrar</button>
                <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
                    Não tem conta? <a href="cadastro.html" style="color: var(--secondary-color); font-weight: bold;">Cadastre-se aqui</a>.
                </p>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 UniMarket </p>
    </footer>

</body>
</html>
