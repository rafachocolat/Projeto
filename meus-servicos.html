<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Serviços - UniService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <div class="logo-icon">U</div>
                <span>UniService</span>
            </a>
            <div class="nav-links">
                <a href="/marketplace">Marketplace</a>
                <a href="/novo-servico">Novo Serviço</a>
                <a href="/perfil">Perfil</a>
                <a href="#" onclick="logout()" class="btn btn-primary">Sair</a>
            </div>
        </div>
    </nav>

    <section style="padding: 40px 0;">
        <div class="container">
            <h1>Meus Serviços</h1>
            <div class="grid" id="servicos" style="margin-top: 30px;">
                <p>Carregando...</p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 UniService - Todos os direitos reservados</p>
            </div>
        </div>
    </footer>

    <script src="/js/api.js"></script>
    <script>
        async function carregarServicos() {
            const usuario = JSON.parse(localStorage.getItem('usuario'));
            if (!usuario) {
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch(`/api/servicos/usuario/${usuario.id}`);
                const servicos = await response.json();
                const container = document.getElementById('servicos');

                if (servicos.length === 0) {
                    container.innerHTML = '<p>Você ainda não tem serviços. <a href="/novo-servico">Crie um!</a></p>';
                    return;
                }

                container.innerHTML = servicos.map(s => `
                    <div class="card">
                        <h3>${s.titulo}</h3>
                        <p>${s.descricao}</p>
                        <p><strong>Categoria:</strong> ${s.categoria}</p>
                        <p><strong>R$ ${parseFloat(s.preco).toFixed(2)}</strong></p>
                    </div>
                `).join('');
            } catch (erro) {
                console.error(erro);
            }
        }

        function logout() {
            fetch('/api/auth/logout').then(() => {
                localStorage.removeItem('usuario');
                window.location.href = '/';
            });
        }

        carregarServicos();
    </script>
</body>
</html>
