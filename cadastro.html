<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - UniService</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">
                <div class="logo-icon">U</div>
                <span>UniService</span>
            </a>
            <div class="nav-links">
                <a href="/">Voltar</a>
            </div>
        </div>
    </nav>

    <section style="min-height: calc(100vh - 200px); display: flex; align-items: center;">
        <div class="form-container">
            <div class="form-header">
                <h1>Criar Conta</h1>
                <p>Junte-se à comunidade UniService</p>
            </div>

            <div id="erro" class="alert alert-danger" style="display: none;"></div>

            <form id="cadastroForm">
                <div class="form-group">
                    <label>Tipo de Usuário</label>
                    <select name="tipo_usuario" required>
                        <option value="">Selecione...</option>
                        <option value="cliente">🔍 Procurar Serviços</option>
                        <option value="prestador">💼 Oferecer Serviços</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" name="nome" placeholder="Seu nome" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label>Telefone</label>
                    <input type="tel" name="telefone" placeholder="(11) 99999-9999">
                </div>

                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" name="senha" placeholder="Crie uma senha" required>
                </div>

                <div class="form-group">
                    <label>Confirmar Senha</label>
                    <input type="password" name="confirmSenha" placeholder="Confirme sua senha" required>
                </div>

                <button type="submit" class="form-submit">Criar Conta</button>
            </form>

            <div class="form-footer">
                <p>Já tem conta? <a href="/login">Faça login</a></p>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 UniService - Todos os direitos reservados</p>
            </div>
        </div>
    </footer>

    <script src="/js/api.js"></script>
    <script>
        document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const dados = Object.fromEntries(formData);

            try {
                const response = await fetch('/api/auth/cadastro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const data = await response.json();

                if (data.sucesso) {
                    localStorage.setItem('usuario', JSON.stringify(data.usuario));
                    window.location.href = '/marketplace';
                } else {
                    document.getElementById('erro').textContent = data.erro;
                    document.getElementById('erro').style.display = 'block';
                }
            } catch (erro) {
                console.error(erro);
                document.getElementById('erro').textContent = 'Erro ao registrar';
                document.getElementById('erro').style.display = 'block';
            }
        });
    </script>
</body>
</html>
